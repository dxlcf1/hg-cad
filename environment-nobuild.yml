name: hg_cad
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip>=24
  - setuptools
  - wheel
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm
  - networkx
  - tensorboard
  - pyyaml
  - requests
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - -f https://data.pyg.org/whl/torch-2.10.0+cu128.html
      - torch==2.10.0+cu128
      - torchvision==0.25.0+cu128
      - torchaudio==2.10.0+cu128
      - lightning>=2.5,<2.7
      - torchmetrics>=1.8,<2
      - torch-geometric==2.8.0
      - pyg_lib
      - torch_scatter
      - torch_sparse
